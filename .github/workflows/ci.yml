name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - 'LICENSE'
      - 'Othello_CSharpPython.code-workspace'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - 'LICENSE'
      - 'Othello_CSharpPython.code-workspace'
      - '.gitignore'
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1" # UTC 月曜 00:00 = JST 月曜 09:00

env:
  DOTNET_VERSION: "10.0.x"
  RUST_MANIFEST: src/Othello.AI/Rust/Cargo.toml
  PYTHON_DIR: src/Othello.AI/Python

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Othello.AI/Rust

      - name: Test (Rust - pure logic)
        run: cargo test --no-default-features --manifest-path ${{ env.RUST_MANIFEST }}

      - name: Build Rust extension (maturin develop)
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          maturin develop --release --manifest-path ${{ env.RUST_MANIFEST }}

      - name: Test (Python - includes Rust/Python parity)
        run: |
          source .venv/bin/activate
          python -m unittest discover -s ${{ env.PYTHON_DIR }} -p "test_*.py"

      - name: Test (C# - Core / Console / ViewModels / Tests)
        run: dotnet test src/Othello.Tests/Othello.Tests.csproj --configuration Release

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Othello.AI/Rust

      - name: Test (Rust - pure logic)
        run: cargo test --no-default-features --manifest-path ${{ env.RUST_MANIFEST }}

      - name: Install maturin
        run: pip install maturin

      - name: Build Rust extension (.pyd)
        shell: pwsh
        run: src/Othello.AI/Rust/build_rust.ps1

      - name: Test (Python - includes Rust/Python parity)
        run: python -m unittest discover -s ${{ env.PYTHON_DIR }} -p "test_*.py"

      - name: Build (full solution incl. WPF / WinUI3)
        run: dotnet build Othello.sln --configuration Release

      - name: Test (C# - full suite)
        run: dotnet test src/Othello.Tests/Othello.Tests.csproj --configuration Release

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Othello.AI/Rust

      - name: "Rust: clippy"
        continue-on-error: true
        run: cargo clippy --manifest-path ${{ env.RUST_MANIFEST }} --no-default-features

      - name: "Rust: fmt check"
        continue-on-error: true
        run: cargo fmt --manifest-path ${{ env.RUST_MANIFEST }} --check

      - name: "Rust: cargo audit"
        continue-on-error: true
        run: |
          cargo install cargo-audit
          cargo audit --file ${{ env.RUST_MANIFEST }}

      - name: "Python: Ruff"
        continue-on-error: true
        run: |
          pip install ruff
          ruff check ${{ env.PYTHON_DIR }}

      - name: "Python: Bandit"
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r ${{ env.PYTHON_DIR }} -x "*/test_*.py"

      - name: "C#: format check (Core / Console / Tests)"
        continue-on-error: true
        run: |
          dotnet format src/Othello.Core/Othello.Core.csproj --verify-no-changes
          dotnet format src/Othello.Console/Othello.Console.csproj --verify-no-changes
          dotnet format src/Othello.Tests/Othello.Tests.csproj --verify-no-changes

      - name: "C#: Analyzer warnings (Core / Console / Tests)"
        continue-on-error: true
        run: |
          dotnet build src/Othello.Core/Othello.Core.csproj
          dotnet build src/Othello.Console/Othello.Console.csproj
          dotnet build src/Othello.Tests/Othello.Tests.csproj

      - name: Gitleaks
        continue-on-error: true
        run: |
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . -v
        env:
          GITLEAKS_VERSION: "8.30.1"

  weekly-audit:
    name: Weekly Dependency & Secret Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Othello.AI/Rust

      - name: "Rust: cargo audit"
        run: |
          cargo install cargo-audit
          cargo audit --file ${{ env.RUST_MANIFEST }}

      - name: Gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . -v
        env:
          GITLEAKS_VERSION: "8.30.1"
